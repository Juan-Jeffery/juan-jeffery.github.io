<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Juan Jeffery | Skills Stat</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; font-family: "Fira Code", monospace; background: #fff; color: #111; }
    h1, h2, .stat-header { font-family: 'Press Start 2P', cursive; text-transform: uppercase; }

    section { padding: 40px 20px; max-width: 1000px; margin: 0 auto; }
    
    /* 大標題簡化 */
    h2.main-title { font-size: 1.5em; border-bottom: 6px double #eee; padding-bottom: 15px; margin-bottom: 40px; text-align: center; }

    .skills-grid { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr); 
      gap: 30px; 
    }

    .stat-card {
      background-color: #f8f8f8;
      padding: 30px;
      border: 3px solid #000;
      position: relative;
      overflow: hidden;
      min-height: 380px;
      display: flex;
      flex-direction: column;
      perspective: 1200px;
      box-shadow: 6px 6px 0px #ddd;
    }

    /* --- 居中 3D 旋轉容器 --- */
    .pixel-container-3d {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 4px;
      height: 4px;
      transform-style: preserve-3d;
      transform: translate(-50%, -50%);
      animation: mc-rotate 6s linear infinite;
      opacity: 0.15;
      z-index: 0;
    }

    @keyframes mc-rotate {
      0% { transform: translate(-50%, -50%) rotateY(0deg) scale(7); }
      100% { transform: translate(-50%, -50%) rotateY(360deg) scale(7); }
    }

    .pixel-item { width: 4px; height: 4px; background: transparent; }

    /* ⚔️ 鑽石劍 (Programming) */
    .mc-sword {
      box-shadow: 
        8px -8px #000, 12px -12px #000, 16px -16px #000, 20px -20px #000,
        8px -12px #4deeea, 12px -16px #4deeea, 16px -20px #4deeea,
        4px -8px #33b1b1, 8px -16px #33b1b1, 12px -20px #33b1b1,
        0px 0px #000, 4px 4px #000, -4px -4px #000,
        -4px 4px #7a5230, -8px 8px #7a5230, -12px 12px #000;
    }

    /* 🔨 鑽石錘 (Tools & Tech) */
    .mc-mace {
      box-shadow: 
        -4px -12px #000, 0px -12px #000, 4px -12px #000,
        -8px -8px #000, -4px -8px #4deeea, 0px -8px #4deeea, 4px -8px #4deeea, 8px -8px #000,
        -8px -4px #000, -4px -4px #33b1b1, 0px -4px #33b1b1, 4px -4px #33b1b1, 8px -4px #000,
        -4px 0px #000, 0px 0px #000, 4px 0px #000,
        0px 4px #7a5230, 0px 8px #7a5230, 0px 12px #000;
    }

    /* --- Minecraft 經驗條風格 --- */
    .exp-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8em;
      font-weight: bold;
      margin-top: 15px;
      color: #333;
    }

    .exp-bar-bg {
      height: 14px;
      background: #444; /* 深色底色 */
      border: 2px solid #000;
      margin: 5px 0 15px 0;
      position: relative;
    }

    .exp-bar-fill {
      height: 100%;
      background-color: #7cfc00; /* 經典經驗綠 */
      /* 創造一格一格的刻度感 */
      background-image: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 18px,
        rgba(0, 0, 0, 0.3) 18px,
        rgba(0, 0, 0, 0.3) 20px
      );
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.4);
    }

    .stat-content { position: relative; z-index: 1; }
    .stat-header { 
      font-size: 0.6em; 
      color: #007acc; 
      margin-bottom: 25px; 
      border-left: 5px solid #007acc;
      padding-left: 10px;
    }

    .tag-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .pixel-tag { background: #fff; border: 2px solid #000; padding: 2px 8px; font-size: 0.7em; }

    @media (max-width: 800px) { .skills-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <section>
    <h2 class="main-title">SKILLS</h2>

    <div class="skills-grid">
      
      <div class="stat-card" data-tool="sword">
        <div class="stat-content">
          <div class="stat-header">PROG. LANGUAGES</div>
          
          <div class="exp-bar-label"><span>Python</span><span>8/10</span></div>
          <div class="exp-bar-bg"><div class="exp-bar-fill" style="width: 80%;"></div></div>
          
          <div class="exp-bar-label"><span>R Language</span><span>8/10</span></div>
          <div class="exp-bar-bg"><div class="exp-bar-fill" style="width: 80%;"></div></div>

          <div class="tag-container">
            <span class="pixel-tag">C#</span><span class="pixel-tag">SQL</span><span class="pixel-tag">Bash</span>
          </div>
        </div>
      </div>

      <div class="stat-card" data-tool="mace">
        <div class="stat-content">
          <div class="stat-header">TOOLS & TECH</div>
          
          <div class="exp-bar-label"><span>Linux (Ubuntu)</span><span>9/10</span></div>
          <div class="exp-bar-bg"><div class="exp-bar-fill" style="width: 90%;"></div></div>

          <div class="tag-container">
            <span class="pixel-tag">Git</span><span class="pixel-tag">Docker</span><span class="pixel-tag">Conda</span><span class="pixel-tag">CI/CD</span>
          </div>
        </div>
      </div>

    </div>
  </section>

  <script>
    document.querySelectorAll('.stat-card').forEach(card => {
      const toolType = card.dataset.tool;
      const container = document.createElement('div');
      container.className = 'pixel-container-3d';
      const item = document.createElement('div');
      item.className = `pixel-item mc-${toolType}`;
      container.appendChild(item);
      card.appendChild(container);
    });
  </script>

</body>
</html>
